version: '3.8'

services:
  nanobot:
    build: .
    ports:
      - "${NANOBOT_GATEWAY_PORT:-18790}:${NANOBOT_GATEWAY_PORT:-18790}"
      - "${NANOBOT_WEBBRIDGE_PORT:-18791}:${NANOBOT_WEBBRIDGE_PORT:-18791}"
    environment:
      # LLM Provider
      - NANOBOT_PROVIDER=${NANOBOT_PROVIDER:-minimax}
      - NANOBOT_MODEL=${NANOBOT_MODEL:-minimax/MiniMax-M2.7-highspeed}
      - NANOBOT_API_KEY_PROVIDER=${NANOBOT_API_KEY_PROVIDER}
      - NANOBOT_API_BASE=${NANOBOT_API_BASE:-https://api.minimax.io/v1}
      
      # WebBridge
      - NANOBOT_API_KEY=${NANOBOT_API_KEY}
      - NANOBOT_HMAC_SECRET=${NANOBOT_HMAC_SECRET:-}
      - NANOBOT_ALLOWED_IP_NULL=${NANOBOT_ALLOWED_IP_NULL:-null}
      
      # Optional overrides
      - NANOBOT_MAX_TOKENS=${NANOBOT_MAX_TOKENS:-8192}
      - NANOBOT_TEMPERATURE=${NANOBOT_TEMPERATURE:-0.1}
    restart: unless-stopped

  webbridge-agent:
    image: r4deu51/webbridge-agent:v0.0.1
    ports:
      - "8080:8080"
    environment:
      - API_KEY=${NANOBOT_API_KEY}
      - AGENT_WS_URL=ws://nanobot:${NANOBOT_WEBBRIDGE_PORT:-18791}
      - HMAC_SECRET=${NANOBOT_HMAC_SECRET:-}
      - AGENT_NAME=${AGENT_NAME:-Nanobot}
    depends_on:
      - nanobot
    restart: unless-stopped
